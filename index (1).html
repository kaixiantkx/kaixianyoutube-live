  }
  details[open] summary::after{transform:rotate(45deg);}
  details .a{color:var(--bone-dim); margin-top:12px; font-size:15px; padding-right:8px;}

  @media (max-width:560px){
    .hero{padding:64px 20px 48px;}
    section{padding:40px 20px;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand" id="brand-text"></div>
  <div class="lang-switch">
    <button data-set="zh" onclick="setLang('zh')">中文</button>
    <button data-set="en" onclick="setLang('en')">EN</button>
  </div>
</div>

<div class="hero">
  <div class="tally"><span></span><span></span><span></span><span></span><span></span></div>
  <div class="eyebrow" id="t-eyebrow"></div>
  <h1 class="title serif"><span id="t-title1"></span><br><span id="t-title2"></span></h1>
  <p class="sub" id="t-subtitle"></p>
</div>

<div class="divider"><div class="line"></div><div class="mark" id="t-about-label"></div><div class="line"></div></div>

<section>
  <h2 class="h serif"><span class="stroke"></span><span id="t-about-title"></span></h2>
  <p class="lead" id="t-about-lead"></p>
  <p id="t-about-body"></p>

  <h2 class="h serif" style="font-size:19px; margin-top:36px;"><span class="stroke"></span><span id="t-purpose-title"></span></h2>
  <p id="t-purpose-body"></p>

  <div class="notice"><p id="t-about-notice"></p></div>
</section>

<div class="divider"><div class="line"></div><div class="mark" id="t-journey-label"></div><div class="line"></div></div>

<section>
  <h2 class="h serif"><span class="stroke"></span><span id="t-journey-title"></span></h2>
  <div class="stat-row">
    <div class="stat"><span class="num" id="t-journey-years-val"></span><span class="lbl" id="t-journey-years-lbl"></span></div>
  </div>
  <div class="placeholder-box" style="margin-top:20px;">
    <p id="t-journey-placeholder"></p>
  </div>
</section>

<div class="divider"><div class="line"></div><div class="mark" id="t-pramote-label"></div><div class="line"></div></div>

<section>
  <h2 class="h serif"><span class="stroke"></span><span id="t-pramote-title"></span></h2>
  <p class="lead" id="t-pramote-body1"></p>
  <p id="t-pramote-body2"></p>
  <p id="t-pramote-body3"></p>
</section>

<div class="divider"><div class="line"></div><div class="mark" id="t-support-label"></div><div class="line"></div></div>

<section>
  <h2 class="h serif"><span class="stroke"></span><span id="t-support-title"></span></h2>
  <p id="t-support-body1"></p>
  <p id="t-support-body2"></p>
  <div class="contact-line">
    <span class="lbl" id="t-support-contact-label"></span>
    <span class="val" id="t-support-contact-value"></span>
  </div>
</section>

<div class="divider"><div class="line"></div><div class="mark" id="t-faq-label"></div><div class="line"></div></div>

<section>
  <h2 class="h serif"><span class="stroke"></span><span id="t-faq-title"></span></h2>
  <div id="faq-list"></div>
</section>

<div class="divider"><div class="line"></div><div class="mark" id="t-rules-label"></div><div class="line"></div></div>

<section>
  <h2 class="h serif"><span class="stroke"></span><span id="t-rules-title"></span></h2>
  <ul class="plain" id="rules-list"></ul>
</section>

<footer>
  <div class="tally"><span></span><span></span><span></span><span></span><span></span></div>
  <p id="t-footer" style="margin:0;"></p>
</footer>

<script>
  var FAQ_KEYS = ['monk','precepts','livestream','method','job','family','escape'];

  function render(lang){
    var c = window.CONTENT[lang];

    document.getElementById('brand-text').textContent = c.brand;
    document.getElementById('t-eyebrow').textContent = c.eyebrow;
    document.getElementById('t-title1').textContent = c.title_line1;
    document.getElementById('t-title2').textContent = c.title_line2;
    document.getElementById('t-subtitle').textContent = c.subtitle;

    document.getElementById('t-about-label').textContent = c.section_about_label;
    document.getElementById('t-about-title').textContent = c.section_about_title;
    document.getElementById('t-about-lead').textContent = c.about_lead;
    document.getElementById('t-about-body').textContent = c.about_body;
    document.getElementById('t-purpose-title').textContent = c.about_purpose_title;
    document.getElementById('t-purpose-body').textContent = c.about_purpose_body;
    document.getElementById('t-about-notice').textContent = c.about_notice;

    document.getElementById('t-journey-label').textContent = c.section_journey_label;
    document.getElementById('t-journey-title').textContent = c.section_journey_title;
    document.getElementById('t-journey-years-val').textContent = c.journey_years_value;
    document.getElementById('t-journey-years-lbl').textContent = c.journey_years_label;
    document.getElementById('t-journey-placeholder').textContent = c.journey_placeholder;

    document.getElementById('t-pramote-label').textContent = c.section_pramote_label;
    document.getElementById('t-pramote-title').textContent = c.section_pramote_title;
    document.getElementById('t-pramote-body1').textContent = c.pramote_body1;
    document.getElementById('t-pramote-body2').textContent = c.pramote_body2;
    document.getElementById('t-pramote-body3').textContent = c.pramote_body3;

    document.getElementById('t-support-label').textContent = c.section_support_label;
    document.getElementById('t-support-title').textContent = c.section_support_title;
    document.getElementById('t-support-body1').textContent = c.support_body1;
    document.getElementById('t-support-body2').textContent = c.support_body2;
    document.getElementById('t-support-contact-label').textContent = c.support_contact_label;
    document.getElementById('t-support-contact-value').textContent = c.support_contact_value;

    document.getElementById('t-faq-label').textContent = c.section_faq_label;
    document.getElementById('t-faq-title').textContent = c.section_faq_title;

    var faqHtml = '';
    FAQ_KEYS.forEach(function(key, i){
      var q = c['faq_' + key + '_q'];
      var a = c['faq_' + key + '_a'];
      faqHtml += '<details' + (i === 0 ? ' open' : '') + '>' +
        '<summary>' + q + '</summary>' +
        '<p class="a">' + a + '</p>' +
        '</details>';
    });
    document.getElementById('faq-list').innerHTML = faqHtml;

    document.getElementById('t-rules-label').textContent = c.section_rules_label;
    document.getElementById('t-rules-title').textContent = c.section_rules_title;
    document.getElementById('rules-list').innerHTML =
      '<li>' + c.rule1 + '</li>' +
      '<li>' + c.rule2 + '</li>' +
      '<li>' + c.rule3 + '</li>';

    document.getElementById('t-footer').textContent = c.footer_line;

    document.documentElement.setAttribute('lang', lang === 'zh' ? 'zh' : 'en');
  }

  function setLang(l){
    render(l);
    document.querySelectorAll('.lang-switch button').forEach(function(btn){
      btn.classList.toggle('active', btn.dataset.set === l);
    });
    try { localStorage.setItem('site-lang', l); } catch(e){}
  }

  (function(){
    var saved = null;
    try { saved = localStorage.getItem('site-lang'); } catch(e){}
    var lang = saved || 'zh';
    setLang(lang);
  })();
</script>

</body>
</html>
