    journey_full_text: [
      "<h3 class='serif'>契机</h3>",
      "<p>我的修行之路始于大学毕业后不久。那段时间，一位中学同桌的朋友骤然离世，毫无预警地走了。这件事对我造成很大的冲击——原来生命可以在毫无征兆的情况下，瞬间画下句点。这份对无常的直接体验，不是从经典或道理上理解的“无常”，而是切身感受到的震动，促使我开始认真探问生命的意义，并从此踏上修行的道路，至今整体已将近五年。</p>",
      
      "<h3 class='serif'>北传自修</h3>",
      "<p>最初几年，我以北传法门自修为主，包括抄写经文、持诵大悲咒，也曾参与佛七禅修营，在念佛与共修的氛围中，慢慢建立起对修行生活的基本认识与定力基础。这段时期更多是依靠信心与仪轨上的熏修，让浮躁的心逐渐安定下来。</p>",

      "<h3 class='serif'>内观启蒙 · 葛印卡十日营</h3>",

      "<h3 class='serif'>短期出家 · 槟城 Pak Auk 道场</h3>",
      "<p>在这之后，我曾在槟城 Pak Auk 道场短期出家，受戒修行一个月，之后还俗。这段僧团生活让我亲身体验了戒律、禅坐、出坡劳动与过堂用斋的完整次第，也让我对“以戒为基础、止观并重”的南传修行体系，有了不只是理论上的理解，而是身体力行的体会。</p>",

      "<h3 class='serif'>现在的修行方向 · 隆波帕默尊者</h3>",
      "<p>经过这些阶段的探索与积累，我目前的修行方向以南传上座部的内观（vipassana）为主，依循隆波帕默尊者的教导，着重在日常生活中保持觉知、如实观照身心的生灭变化，而不刻意追求特定的境界或感受。这个方法的核心，是把修行从禅坐的蒲团上带回到日常生活的每一个当下——走路、吃饭、说话、工作，都是觉知的对象。</p>",
      "<p>隆波帕默尊者强调“不要去造作”，意思是不刻意压抑念头，也不刻意追逐某种平静或殊胜的体验，只是单纯地、一次又一次地觉知身心当下正在发生的事。这种“如实观照”的训练，让我慢慢学会和自己的情绪、念头保持一个健康的距离——看着它们生起、变化、消失，而不立刻被卷入其中，也不急着评判或压制。这个过程并不轻松，常常需要在挫折、烦躁、甚至自我怀疑中，一次又一次地重新提起觉知，但正因为如此，这条路走得越久，越能感受到内心确实在变得稳定与柔软。</p>",

      "<h3 class='serif'>实际操作 · 隆波田动中禅与隆波帕默的结合</h3>",
      "<p>在实际操作上，我主要透过隆波田的动中禅来落实隆波帕默尊者所教导的观念。这两者的结合是经过近一年的专精练习后，我找到的最适合自己的模式。</p>",
      "<p>隆波帕默尊者强调“以安住且中立的心，如实了知身心”，这是一种高阶的心法。但对于初学者或充满烦恼的心而言，常常很难凭空找到“安住”的抓手。动中禅以规律的手部或肢体动作作为觉知的所缘，恰好弥补了这一点。具体的操作是：透过一连串清楚、刻意放慢的十四个手部动作，让心有一个具体、持续的对象可以安住。手每翻动一次、移动一次，心就轻轻地“知道”一次。这里的知道，不是死死盯住，正是隆波帕默所提倡的“轻柔的觉知”。</p>",
      "<p>当念头生起、心不可避免地跑掉时，动作的中断或变得迟疑、机械化，往往是最先察觉到的信号。这就形成了一个天然的警报器。此时，隆波帕默的“观心”法门就完美介入了——我们不需要因为走神而生气，也不需要咬紧牙关把心硬拉回来，而是单纯地“知道心刚才跑掉了”。一旦这个“知道”发生，迷失的当下就断开了，心自然回到了中立与安住的状态，手部的动作又能重新恢复自然。换句话说，隆波帕默的“如实观照”是修行的方向与心态，而隆波田动中禅则是我用来落实这个方向的具体方法。身法（动中）负责提供定点，心法（观心）负责处理迷失，两者相得益彰。</p>",

      "<h3 class='serif'>修行不可退让的几个原则</h3>",
      "<p>在这条路上，有几个原则是我始终提醒自己不能妥协的。第一，戒是修行的地基，没有持戒的基本约束，禅修很容易流于自我安慰或情绪管理，而不是真正的智慧增长。第二，修行不能用“想”来完成，只能用“看”来完成——任何企图用思考、分析、说服自己来达到平静的方式，本质上都只是换一种造作，而不是观照。第三，觉知不是压抑，也不是放纵：压抑是把不想要的念头推开，放纵是任由念头主导行为，而觉知是不推不拉地看着它，让它自然地生、自然地灭。第四，进步从来不是线性的：退步、烦恼重新现起、甚至对修行本身产生怀疑，都是过程的一部分，不代表方法错了或自己不行，重点是能不能在退步发生的当下，依然保持如实观照，而不是陷入自我谴责。</p>",

      "<h3 class='serif'>在生活中的实践</h3>",
      "<p>修行的真实考验，往往不在禅堂里，而在生活的细节中。求职过程中的等待与不确定、与人互动时的疲惫与摩擦、独处时浮现的迷茫与自我怀疑，都是练习如实观照最直接的素材。比如，在等待结果时，焦虑感生起，我练习的不是说服自己“不要焦虑”，而是单纯地知道“现在有焦虑”，让这份觉知本身把心稳住，而不是被焦虑带着跑。又比如，在高密度的人际互动后感到疲惫，我练习的是承认这份疲惫的真实存在，而不是责怪自己“不够坚强”。这些练习都很微小，常常也不“成功”——心还是会乱、还是会被卷走——但每一次能够认出“心乱了”的那个瞬间，本身就已经是觉知在工作。</p>",

      "<h3 class='serif'>修行路上犯过的错误</h3>",
      "<p>在多年的练习中，我也走过不少偏差，这些偏差本身后来也成为很重要的学习。第一个错误，是误以为某一种特定的止禅方法才是必须坚守的——例如执着于腹部起伏、持咒、观呼吸，或是现在惯用的动中禅——好像换了方法就是退步或不专一。后来才明白，这些不过是不同的“所缘”，重点从来不是所缘本身，而是有没有透过这个所缘，培养出持续的觉知，任何一种方法，只要用对了心态，都能走到彼岸。</p>",
      "<p>第二个错误，是误把“特殊体验”当成进步的标志——觉得有殊胜的感受、深刻的宁静、奇异的境界出现，才代表修行有所突破。实际上，状态本来就是起伏不定的，有时清明，有时昏沉，有时烦恼特别多，这些起落都只是如实的现象，不代表退步，也不代表必须出现某种体验才算前进。</p>",
      "<p>第三个错误，是想要刻意维持修行的“进度”，一旦生活中出现变化、打乱原本的节奏，就立刻感到焦躁不安，甚至因为生活节奏被打破而生气。这其实暴露出现一种隐藏的执取——把“保持稳定的修行状态”也变成了一种渴求与造作，而忘了觉知本来就应该能够安住在任何节奏的变化之中。</p>",
      "<p>第四个错误，是虚荣心与我慢的生起——心里暗自觉得别人修得不对、不够认真，自己却修得比较好。这种比较与评判，看似与修行有关，实际上只是自我感觉在另一个场域里继续运作，是修行包装下的我执。</p>",
      "<p>第五个错误，是误以为姿势很重要——能够双盘坐，会让自己觉得“修得比较优秀”。后来察觉，这种对姿势的执着，其实也只是在喂养自我感，与觉知的深浅并没有直接关系。</p>",
      "<p>第六个错误，是追求平静、渴望特殊体验本身。正如隆波帕默尊者所教导的，当心一心想要某种境界、某种感受时，其实心已经跟随那个境界跑去玩乐了，并没有真正安住在觉知中——越想要平静，反而越远离了平静。</p>",
      "<p>第七个错误，是对自己生起不必要的怀疑——总觉得自己修得不对、走错了方向，但回头看，其实当时已经走在正轨上，只是那份疑心让自己无法信任这条路，也无法信任自己。</p>",
      "<p>这些错误现在回看，都不是修行路上的弯路，而是修行本身的一部分——透过一次次的误认与修正，才慢慢看清楚什么是真正的觉知，什么只是觉知的替代品。</p>",

      "<h3 class='serif'>修行融入创作</h3>",
      "<p>除了静坐与日常的觉知练习，我也尝试将修行融入创作——用中文写歌词，探讨无常、放下、自心本净等主题，并透过 AI 工具制作配套的音乐影像，希望能用现代人容易接受的形式，传递一些佛法的体会。对我来说，写歌和修行并不是两件分开的事：每一次提笔，其实也是在梳理自己对某个法义的理解是否通透，是否只是概念上的认同，还是真的有在生活中觉受过。这个过程让我感受到，修行不一定要脱离生活才能进行，反而可以成为观察自己、消化生活经验的方式——无论是工作中的压力、人际关系的摩擦，还是对未来方向的不确定感，都可以成为练习如实观照的素材。</p>",

      "<h3 class='serif'>结语</h3>",
      "<p>走过这几年，我逐渐确定自己想走一条扎实、长期、不浮躁的修行道路，不急于求成，也不期待修行能立刻解决生活中的所有问题，而是把它当作一生的功课，慢慢地、踏实地走下去。</p>"
    ].join(""),

    support_body1: "坦诚地说，作为一名全职修行者，我目前的修行之路有些“非传统”。由于我个人的胃部健康问题，无法严格持守南传道场“过午不食”的戒律，这使我暂时无法依托现有的僧团体制。因此，我正在探索一条不依赖传统体制的独立求道之路。在此直播，不仅是为了静心，也是在等待能在修行理念上产生共鸣的“有缘人”，以谦卑和开放的心态，寻找外部独立护持的机会。",
    support_body2: "在佛教传统中，护持（Dana）是一种珍贵的结缘。我所期盼的护持，并非单方面的施舍，而是一种基于对修行价值深刻认同的相互成就。如果您能在我的直播中感受到共鸣与宁静，愿意提供维持基本生存的协助（如简单的食宿庇护），我将充满感恩。为了保持修行的纯粹，我期盼这是一种简单、不附带世俗条件（如强制加入团体、配合宣传等）的互助。而在接受这份善意的同时，我的最终目标，依然是走向身心与现实生活的完全独立。",
    support_contact_label: "联系方式（探讨护持可能与修行交流）：",
    support_contact_value: "kaixiantkx11@gmail.com",
    
    // ---- FAQ 板块 ----
    section_faq_label: "常见问题",
    section_faq_title: "常见问题",

    faq_real_q: "这是真人直播还是 AI / 录像回放？",
    faq_real_a: "这绝对是百分之百的真人即时直播。不是提前录制好的循环播放，也不是如今常见的 AI 动画生成或人机表演。在直播中，你会看到属于真实人类的每一个细节——打哈欠、停顿、抓痒、调整姿势、走神，或是显露出的疲惫。我选择直播而非上传精剪录像，正是为了保留这份无可剪辑、也不加滤镜的“真实当下”。",

    faq_meaning_q: "日复一日地重复动作，这样修行的意义是什么？",
    faq_meaning_a: "修行的意义不在于获得超自然的能力，或是单纯逃避世俗的烦恼，而在于彻底看清身心的实相。当我们透过日复一日的观察，真正体会到念头、情绪和感受是如何生起又自动灭去时，就会慢慢停止对它们的执取和盲从。内心的拉扯与痛苦随之剥落，最终，无论外在环境如何顺逆，都能保有内心一份不被动摇的清明与自由。这也是佛陀教导的最终目的——灭苦。",

    faq_monk_q: "为何不出家？",
    faq_monk_a: "出家是一种选择，不是唯一正确的修行方式。我评估过实际情况——身体状况无法配合过午不食，以及寺院日常的法会与接待活动对我而言负荷过高——目前在家修行更适合我。出家不是\"更高级\"的修行，重点是找到自己能持续走下去的方式。",

    faq_precepts_q: "为何无法守八戒？",
    faq_precepts_a: "过午不食这一条，我身体状况无法配合，不是不愿意。我有裂孔疝（hiatal hernia）——胃的上半部分经横膈膜的开口移位到胸腔，容易造成胃酸反流。这种情况下，长时间空腹反而会让胃酸在空胃中持续刺激食道，使反流和不适加重；规律的少量进食，是控制症状的常见方式，过午不食对我而言并非单纯的意志力问题，是身体结构造成的限制。戒律的精神是简化生活、减少贪欲，这个精神我在日常生活中以适合自己身体状况的方式实践，但不勉强做身体无法承受的事——那会让修行变成跟身体对抗。",

    faq_livestream_q: "为何要公开禅修？",
    faq_livestream_a: "公开直播有几个目的：督促自己长期坚持练习、留下修行记录，也包括寻找认同这件事并愿意提供护持的人。这不是表演，也不是教学——动中禅本身不需要观众，公开只是在原有的修行之上，多加了这几层用途。",

    faq_method_q: "为何用动中禅，而不是其他方法？",
    faq_method_a: "我接触过不同的禅修方式（整体修行近五年），但真正在隆波田、隆波帕默的传承上持续练习，其实只有近一年的时间。选择一个法门不是比较“哪个最正统”，而是“哪个我能真正在生活中用起来”。隆波帕默尊者教导以中立的心如实“观心”；而动中禅提供了一个极佳的“锚点”。这完美结合了心法与身法：身体负责规律地动，心负责轻松地知道，一旦发现心跑了，不自责，只需借由动作的停顿觉察迷失，重新回到当下。这是我验证过能真正长久走下去的道路。",

    faq_method_q: "为什么你的手一直在动？这是什么修行方法？",
    faq_method_a: "我修习的是南传佛教中的‘动中禅’（正念动中禅 / Mahasati Meditation），由泰国隆波田尊者所传。它通过一套规律的手部动作，让心有一个清晰的‘锚点’。很多人以为禅修必须静坐不动，但实际上，修行不在于身体的静止，而在于‘觉知’的连续。在动作中保持觉知，能有效对治昏沉与妄念。这也是为什么你会在镜头里看到我持续在做这套动作。",

    faq_job_q: "为何不去找正式工作？",
    faq_job_a: "自动化与 AI 是我的专业背景，但我内心最真实的渴望，是探索生命的本质。在权衡之后，我决定遵从内心的指引，选择将长期闭关和全职禅修作为当下的重心。与其在职场中带着内心的迷茫去写代码，我更愿意先花时间把‘自己’这台精密仪器的底层代码理清楚。未来如果因缘需要我去工作，我会随时回归；但当下，禅修就是我唯一专注的事。",

    faq_family_q: "为何依赖家人？",
    faq_family_a: "我目前的物欲降到了最低，依靠过往的存款，只需要极少的生活成本就能维持禅修。家人的支持为我提供了一个暂时的避风港，这是我极大的福报，但我并不以此为长久的依靠。我正在积极寻找外部独立护持的机会（或探索极简自足的方式），我的目标是成为一个不仅在精神上独立，在现实生存中也不给任何人增加负担的修行者。",

    faq_escape_q: "这样做是不是在逃避现实？",
    faq_escape_a: "如果我想逃避现实，大可以找一份轻松的工作混日子，或者沉迷于娱乐。但我选择的是一条向内深挖的阻力最大的路。禅修不是闭上眼睛不看世界，而是睁开内心的眼睛，去看清所有的痛苦、贪婪与抗拒。剥离了社会身份、工作头衔后，一个人只面对自己的心，这是最赤裸裸的现实，没有极大的定力和勇气是坐不住的。",

  en: {
    brand: "Dynamic Meditation Journal",

    eyebrow: "Personal Practice · Public Record",
    title_line1: "Each movement,",
    title_line2: "known as it happens.",
    subtitle: "A companion site for a personal Mahasati (dynamic meditation, Luangpor Teean lineage) livestream practice. Documenting the practice and answering common questions — not a platform for religious debate or comparison.",
    
    btn_youtube: "Join the YouTube Livestream",
    welcome_msg: "Whether you clicked here by chance or stayed out of curiosity, you are welcome to sit quietly with me in this noisy corner of the internet. If you are interested in vipassana meditation, you are welcome to keep me quiet company; if not, no worries at all, feel free to scroll away and wishing you a peaceful day.",

    section_about_label: "ABOUT",
    section_about_title: "What this is",
    about_lead: "Mahasati, taught by the late Thai meditation master Luangpor Teean, is a practice of cultivating pure awareness of bodily movement through a set sequence of hand motions. No mantra, no analysis — simply moving, and knowing that you moved.",
    about_body: "The method emphasizes naturalness and ease over forced concentration, and can be practiced anywhere, integrated into daily life. What you'll see on the livestream is the real process: quiet, repetitive, sometimes focused, and sometimes battling sleepiness (sloth-torpor) or a restless mind. You are not watching a perfected saint, but an ordinary person working through defilements. It is shown exactly as it happens, unedited and unembellished.",
    about_purpose_title: "Why this livestream exists",
    about_purpose_body: "The original purpose of this livestream is simple: to sustain long-term, regular practice through accountability, and to keep a record of the journey. At the same time, making this public is done with an open mind—this is my authentic daily practice. If someone recognizes the value in it and an affinity exists, support will naturally follow. I don't force it, nor do I hide from the possibility.<br><br>I also constantly remind myself of these three core priorities for this channel: First, <b>urging myself to maintain long-term diligent practice</b> is the unshakable foundation. Second, <b>keeping an authentic record</b> of the journey for my future self. Third, any support is merely a natural byproduct if it happens naturally, never a forced goal. There is no need to be anxious about traffic or viewer counts—because even that anxiety, should it arise, is a perfect object for cultivating awareness.",
    
    about_notice: "The practice is silent throughout — no narration, no teaching. This is not a space for religious comparison, debate, or persuasion.<br><br><b>Disclaimer:</b> The Vipassana practice demonstrated on this channel is rooted in the Buddhist tradition. Due to fundamental theological differences, this practice may not align with the core doctrines of monotheistic faiths, such as Islam. Muslims and followers of other specific faiths are respectfully advised to exercise personal discretion or consult the guidelines of their respective religious scholars to avoid any doctrinal conflict.",

    // ---- 直播时段 (Schedule) ----
    section_schedule_label: "SCHEDULE",
    section_schedule_title: "Daily Practice Sessions",
    schedule_lead: "The daily livestream is divided into several main sessions based on natural daily routines, typically named as 'Day N | Session':",
    schedule_1: "<b>Morning Session:</b> After waking up, before breakfast. Usually the most energetic period, serving as the main practice time.",
    schedule_2: "<b>Late Morning:</b> After breakfast, before lunch.",
    schedule_3: "<b>Afternoon:</b> After a short rest or shower, before evening. Adjusted based on daily energy levels.",
    schedule_4: "<b>Evening Session:</b> Before sleep. Optional, and may be skipped if energy is low.",
    schedule_note: "Note: The actual livestream strictly depends on my daily physical and mental state. No rigid schedule is forced. If a session or a day is missed, the 'Day N' counter continues normally without forced 'make-ups'. The duration is kept naturally as much as possible.",

    section_logs_label: "PRACTICE LOGS",
    section_logs_title: "Recent Insights",
    log_date_1: "Late 2024",
    log_text_1: "[Site Launch] Compiling years of practice history into words has been a deep reflection in itself. Seeing past frustrations, confusions, and detours laid out brings a sense of candid relief. The path is still long; through this site and the livestream, may I steadily anchor myself in every present moment.",

    section_journey_label: "PRACTICE HISTORY",
    section_journey_title: "My background in practice",
    journey_years_label: "Time practicing",
    journey_years_value: "Nearly 5 yrs overall (~1 yr in current lineage)",

    journey_full_text: [
      "<h3 class='serif'>The Catalyst</h3>",
      "<p>My path of practice began shortly after graduating from university. During that time, a friend passed away suddenly without any warning. This visceral, direct experience of impermanence—not just an intellectual understanding from texts, but a deep psychological shock—compelled me to seriously question the meaning of life. It was this event that set me on the spiritual path nearly five years ago.</p>",
      
      "<h3 class='serif'>Early Mahayana Practice</h3>",
      "<p>In the first few years, my practice was rooted in the Mahayana tradition. I spent my time copying sutras, chanting mantras, and attending intensive Buddha-name recitation retreats. Through faith and ritualistic practice, my restless mind gradually found a foundation of stability and focus.</p>",

      "<h3 class='serif'>Vipassana Awakening: Goenka 10-Day Retreat</h3>",
      "<p>Later, I attended a 10-day Goenka Vipassana meditation retreat, which served as my formal introduction to the Theravada Vipassana tradition. The strict silence, rigorous schedule, and training in purely observing physical sensations allowed me to experience the profound difference between 'observing reality as it is' and merely reciting or praying. I realized that practice does not require seeking outward, but working directly with the body and mind in the present moment. This sparked a deep interest in the Theravada tradition and eventually led me to explore monastic life.</p>",

      "<h3 class='serif'>Short-Term Ordination: Pa-Auk Tawya, Penang</h3>",
      "<p>Following this, I underwent a short-term ordination for a month at the Pa-Auk Tawya monastery in Penang. Living as part of the Sangha allowed me to physically experience the full progression of monastic life: observing strict precepts, formal sitting, manual labor, and mindful eating. It gave me a practical, lived understanding of the Theravada system, which is firmly built on precepts as a foundation for both Samatha (tranquility) and Vipassana (insight).</p>",

      "<h3 class='serif'>Current Direction: Luangpor Pramote Pamojjo</h3>",
      "<p>Through these explorations, my current practice is firmly centered on Theravada Vipassana, following the teachings of Luangpor Pramote Pamojjo. The focus is on maintaining awareness in everyday life—observing the continuous arising and passing away of physical and mental phenomena without chasing specific profound states. The core of this method is bringing practice off the meditation cushion and into every moment of daily life: walking, eating, talking, and working.</p>",
      "<p>Luangpor Pramote emphasizes 'non-fabrication.' This means not deliberately suppressing thoughts, nor chasing after peace. It is simply about knowing what is happening in the body and mind in the present moment, over and over again. This training of 'observing reality as it is' has taught me to maintain a healthy distance from my own emotions and thoughts—watching them arise, change, and vanish without immediately getting entangled or rushing to judge them. It’s not an easy process; it often involves repeatedly re-establishing awareness amidst frustration and self-doubt. But because of this realism, the longer I walk this path, the more stable and softer my mind genuinely becomes.</p>",

      "<h3 class='serif'>Practical Application: The Synergy of Mahasati and Citta-Nupassana</h3>",
      "<p>In terms of practical application, I primarily use Luangpor Teean's Dynamic Meditation (Mahasati) to actualize Luangpor Pramote’s teachings. This combination is the model I found most suitable after dedicating nearly a year specifically to this lineage.</p>",
      "<p>Luangpor Pramote teaches us to 'know the body and mind as they are with a neutral, settled mind.' This is an advanced internal principle. For beginners, or when the mind is highly restless, it is incredibly difficult to find a stable anchor out of thin air. Mahasati fills this gap perfectly. Using a standardized sequence of 14 rhythmic hand movements, the mind is given a concrete, continuous object to rest upon. Every time the hand flips or moves, the mind lightly 'know's it once. This is exactly the 'soft, light awareness' advocated by Luangpor Pramote.</p>",
      "<p>When thoughts arise and the mind inevitably wanders, the physical movement often unintentionally pauses, hesitates, or becomes robotic. This serves as a natural, built-in alarm system. At this exact moment, Luangpor Pramote's 'Watching the Mind' (Citta-Nupassana) steps in seamlessly: there is no need to get angry for losing focus, nor do we aggressively drag the mind back. We simply 'know that the mind just wandered.' The moment this 'knowing' happens, the state of being lost is cut off, the mind naturally returns to neutrality, and the physical movements resume fluidly. The physical method provides the anchor and the alarm; the mental method provides the neutral attitude to handle the wandering mind. They complement each other perfectly.</p>",

      "<h3 class='serif'>Non-Negotiable Principles of Practice</h3>",
      "<p>On this path, there are several principles I refuse to compromise on. First, precepts are the foundation. Without basic moral restraint, meditation easily devolves into mere emotional management rather than true cultivation of wisdom. Second, practice can only be done through 'seeing,' not 'thinking'—any attempt to rationalize or force the mind into calmness is just another form of fabrication. Third, awareness is neither suppression nor indulgence. It is watching thoughts arise and pass naturally without pushing or pulling. Fourth, progress is never linear: setbacks, returning hindrances, and even doubts about the practice are all part of the process. What matters is the ability to maintain observation even in the midst of a regression, rather than falling into self-condemnation.</p>",

      "<h3 class='serif'>Practice in Daily Life</h3>",
      "<p>The true test of practice rarely happens in the meditation hall, but in the friction of daily life. The anxiety of waiting during a job hunt, the fatigue of social interactions, the confusion when alone—these are the most direct materials for practice. For instance, when anxiety arises while waiting for an interview result, I don't try to convince myself 'not to be anxious.' Instead, I simply know 'anxiety is present,' allowing awareness itself to stabilize the mind rather than being dragged away by the emotion. Recognizing 'the mind is messy' in the moment is, in itself, awareness at work.</p>",

      "<h3 class='serif'>Mistakes Made on the Path</h3>",
      "<p>Over the years, I've taken many detours, which have become invaluable lessons. The first was dogmatic attachment to a single method—believing that if I wasn't watching the breath or using the hand movements perfectly, I was regressing. I eventually realized methods are just anchors; what matters is cultivating continuous awareness through them.</p>",
      "<p>The second mistake was mistaking 'special experiences' as markers of progress. I used to think that profound tranquility or bizarre phenomena meant a breakthrough. In reality, states constantly fluctuate—sometimes clear, sometimes dull. These are just phenomena to be observed, not requirements for moving forward.</p>",
      "<p>The third mistake was trying to artificially maintain a 'progress schedule.' When life disrupted my routine, I would feel anxious and angry. This revealed a hidden craving: turning 'stable practice' into another form of attachment, forgetting that awareness should be able to rest in any rhythm of life.</p>",
      "<p>The fourth mistake was the arising of vanity and spiritual pride—secretly feeling that others weren't practicing correctly or seriously enough, while I was doing better. This comparison and judgment might seem related to practice, but it's actually just the ego operating in a different arena; it is ego disguised as spirituality.</p>",
      "<p>The fifth mistake was believing that physical posture is crucial—thinking that being able to sit in a full lotus position made me a 'superior' practitioner. I later realized that this obsession with posture was merely feeding the ego and had no direct relation to the depth of awareness.</p>",
      "<p>The sixth mistake was pursuing peace and desiring special experiences themselves. As Luangpor Pramote teaches, when the mind desperately wants a certain state or feeling, it has actually run off to play with that realm and is not truly resting in awareness. The more you desire peace, the further away from it you become.</p>",
      "<p>The seventh mistake was generating unnecessary self-doubt—always feeling I was practicing incorrectly or heading the wrong way. Looking back, I was actually on the right track; it was just that the doubt made me unable to trust the path, and unable to trust myself.</p>",
      "<p>Looking back now, none of these mistakes were detours, but an essential part of the practice itself. It is only through repeated misidentifications and corrections that one gradually sees clearly what true awareness is, and what are merely its substitutes.</p>",

      "<h3 class='serif'>Integrating Practice with Creation</h3>",
      "<p>Beyond sitting and daily awareness, I also integrate practice into creative work—writing Chinese lyrics exploring themes of impermanence and letting go, and pairing them with AI-generated visuals. Writing forces me to evaluate whether my understanding of the Dhamma is truly digested or merely conceptual. It proves that practice doesn't require withdrawing from the world; creative expression and daily pressures alike can serve as raw material for observing reality.</p>",

      "<h3 class='serif'>Conclusion</h3>",
      "<p>Through these years, I have resolved to walk a grounded, long-term, and patient spiritual path. I don't rush for enlightenment, nor do I expect meditation to instantly solve all worldly problems. Instead, I view it as a lifelong assignment, stepping forward steadily, one movement at a time.</p>"
    ].join(""),

    section_pramote_label: "LINEAGE",
    section_pramote_title: "About Luangpor Pramote",
    pramote_body1: "Luangpor Pramote Pamojjo is a well-known contemporary Thai meditation teacher with extensive experience in both samatha and vipassana practice. He is known for the \"watching the mind\" (citta) method, particularly suited to people with busy, thought-crowded modern lives.",
    pramote_body2: "The core principle of his teaching is: maintain awareness, with a settled and neutral mind, to know the reality of body and mind as they truly are — not staring fixedly, not controlling, simply knowing. When the mind reacts with liking or disliking, that reaction itself is simply known, allowing the mind to return to a neutral, settled state.",
    pramote_body3: "This approach complements Mahasati well: Mahasati trains awareness of bodily movement, while Luangpor Pramote's teaching trains awareness of the mind's rising and passing states. Practicing both together is my main approach currently.",

    // ---- EN: 支持/护持板块 ----
    section_support_label: "SUPPORT & DANA",
    section_support_title: "A Candid Note on Support",
    support_body1: "To be fully transparent, as a full-time practitioner, my current path is somewhat 'unconventional'. Due to personal stomach health issues, I cannot adhere strictly to the traditional Theravada rule of fasting after noon, which temporarily prevents me from relying on the established monastic system. Therefore, I am exploring an independent path of practice outside traditional institutions. I stream here not only to maintain my inner peace but also to wait for kindred spirits who resonate with my values, seeking opportunities for independent external support with a humble and open heart.",
    support_body2: "In the Buddhist tradition, support (Dana) is a precious spiritual connection. The support I hope for is not one-sided charity, but rather a mutual achievement based on a deep, shared appreciation for the value of spiritual practice. If you find resonance and peace in my stream, and are willing to offer assistance for basic survival (such as simple shelter or food), I would receive it with deep gratitude. To maintain the purity of this practice, I hope for a simple mutual support free from worldly conditions (such as mandatory group affiliations or promotional obligations). While accepting this kindness, my ultimate goal remains to achieve complete independence in both mind and physical reality.",
    support_contact_label: "Contact (for Dana/Support inquiries and practice exchange):",
    support_contact_value: "kaixiantkx11@gmail.com",

    section_faq_label: "FAQ",
    section_faq_title: "Frequently asked",

    faq_real_q: "Is this a real live stream, or an AI / recorded replay?",
    faq_real_a: "This is 100% a real, real-time live broadcast. It is not a pre-recorded loop, nor is it an AI-generated animation or a bot performance. During the stream, you will see every genuine detail of a human practicing—yawning, pausing, scratching, adjusting posture, losing focus, or showing natural fatigue. I choose to livestream rather than upload polished videos precisely to preserve this unedited, unfiltered 'authentic present moment'.",

    faq_meaning_q: "What is the meaning or purpose of repeating these movements day after day?",
    faq_meaning_a: "The purpose of this practice is not to acquire supernatural abilities or simply to escape worldly troubles, but to thoroughly see the true nature of body and mind. When, through day-after-day observation, we truly experience how thoughts, emotions, and sensations arise and automatically pass away, we gradually stop clinging to or blindly following them. The internal tug-of-war and suffering peel away. Ultimately, regardless of favorable or adverse external circumstances, the mind can maintain an unshakable clarity and freedom. This is the ultimate goal of the Buddha's teaching—the cessation of suffering.",

    faq_monk_q: "Why not become a monk?",
    faq_monk_a: "Ordination is one path, not the only valid one. I've weighed the realities — my body cannot sustain the no-food-after-noon rule, and monastery life's frequent ceremonies and hosting duties are more than I can sustain. Lay practice isn't a lesser form — what matters is finding a form that's actually sustainable.",

    faq_precepts_q: "Why can't you keep the Eight Precepts?",
    faq_precepts_a: "The no-food-after-noon rule specifically conflicts with my body, not my willingness. I have a hiatal hernia — part of the upper stomach shifts through an opening in the diaphragm into the chest cavity, which tends to cause acid reflux. With this condition, long gaps without food can let stomach acid continue irritating the esophagus on an empty stomach, worsening reflux and discomfort; regular, smaller meals are a common way to manage the symptoms. Skipping food after noon isn't simply a matter of willpower for me — it's a structural limitation of the body. I practice the spirit of simplicity and reduced craving in ways my body can sustain, rather than forcing a rule that would turn practice into a fight against my own body.",

    faq_livestream_q: "Why livestream meditation publicly?",
    faq_livestream_a: "The livestream serves several purposes: sustaining long-term practice, keeping a record, and also finding people who recognize this and are willing to offer support. It is not a performance or a teaching session — Mahasati itself needs no audience; going public simply adds these layers on top of the practice.",

    faq_method_q: "Why this method, not another?",
    faq_method_a: "I've explored different approaches (practicing for nearly 5 years overall), but my dedicated practice in the combined lineage of Luangpor Teean and Luangpor Pramote is actually only about a year. Choosing a method isn't about which is 'most orthodox', but 'which can I practically apply in daily life.' Luangpor Pramote teaches watching the mind neutrally; Mahasati provides an excellent physical anchor. The body moves rhythmically, the mind lightly acknowledges it, and when the mind wanders, a pause in the hand movement serves as a gentle alarm to return. This synergy is the path I have verified as sustainable for me.",

    faq_method_q_en: "Why are your hands constantly moving? What is this practice?",
    faq_method_a_en: "I am practicing 'Dynamic Meditation' (Mahasati Meditation), a Theravada Buddhist method developed by the Thai master Luang Por Teean. It uses a rhythmic series of hand movements to provide a clear 'anchor' for the mind. Many people think meditation requires sitting completely still, but true practice is not about physical stillness—it's about the continuity of awareness. Maintaining awareness through movement is highly effective in overcoming sleepiness and wandering thoughts. That is why you see me performing these movements on stream.",
    
    faq_job_q: "Why not get a regular job?",
    faq_job_a: "Automation and AI are my professional background, but my truest inner desire is to explore the essence of life. After careful consideration, I've decided to follow my inner guidance and make long-term retreat and full-time meditation my current focus. Rather than writing code in the corporate world while carrying inner confusion, I prefer to first take the time to sort out the 'source code' of this complex instrument called 'myself'. If future circumstances require me to return to work, I am ready to do so; but right now, meditation is my sole focus.",

    faq_family_q: "Why rely on family support?",
    faq_family_a: "My material desires are currently at an absolute minimum. With my past savings, I only need a very small amount to cover my living expenses and maintain my practice. My family's support provides a temporary safe harbor, which is a profound blessing, but I do not intend to rely on it long-term. I am exploring opportunities for independent external sponsorship or a fully self-sufficient minimalist lifestyle. My goal is to be a practitioner who is not only spiritually independent but also completely self-reliant without being a burden to anyone.",

    faq_escape_q: "Isn't this just escaping reality?",
    faq_escape_a: "If I wanted to escape reality, I could easily find a comfortable job to coast through or lose myself in entertainment. Instead, I've chosen the path of digging inward—the path of greatest resistance. Meditation is not about closing your eyes to the world; it’s about opening your inner eyes to clearly see all suffering, craving, and resistance. Stripped of social identities and job titles, you are left facing nothing but your own mind. This is the rawest, most absolute reality, and sitting with it requires immense concentration and courage.",

    section_rules_label: "GUIDELINES",
    section_rules_title: "Comments & conduct",
    rule1: "Comments are open for good-faith exchange, not doctrinal debate. Attacks, mockery, proselytizing, or remarks targeting other faiths or groups will be hidden or removed without further explanation.",
    rule2: "During the livestream, focus stays on practice — replies may not be immediate.",
    rule3: "For privacy and safety, specific locations, real names, and personal schedules are strictly kept confidential. Inquiries regarding these details will not be answered.",
    rule4: "Contact is strictly limited to formal, non-instant written communication. Phone numbers and instant messaging accounts (e.g., WhatsApp / WeChat) will not be provided.",
    rule5: "To protect the focus of the practice and the purity of the channel, any persistent provocation, excessive probing into privacy, or malicious behavior will result in an immediate block or hide. Maintaining a safe boundary takes priority over appearing artificially 'friendly'.",

    footer_line: "Every repetition is its own beginning."
  }
};
</script>

<style>
  :root{
    --ink:#1C1B19;
    --bone:#F2EDE4;
    --bronze:#8A7355;
    --moss:#4A5D52;
    --stone:#C9C3B8;
    --bone-dim: rgba(242,237,228,0.62);
    --bone-faint: rgba(242,237,228,0.32);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--ink);
    color:var(--bone);

  a{color:var(--bronze); text-decoration:none; border-bottom:1px solid currentColor;}

  .topbar{

  .lang-switch{

    border-radius:999px;
    padding:3px;

  .lang-switch button{
    font-family:'Inter',sans-serif;
    font-size:13px;
    letter-spacing:0.04em;
    padding:6px 14px;
    border-radius:999px;
    border:none;
    background:transparent;
    color:var(--bone-dim);

    transition:all .2s ease;

  .lang-switch button.active{
    background:var(--bronze);

  }

  .hero{
    padding:86px 28px 64px;
    max-width:760px;
    margin:0 auto;
    text-align:center;
  }
  .tally{
    display:flex; justify-content:center; gap:7px;
    margin-bottom:34px;
    opacity:0.9;
  }
  .tally span{
    width:3px; height:46px;
    background:var(--bronze);
    border-radius:1px;
    transform-origin:bottom;
    animation:rise .7s ease both;
  }
  .tally span:nth-child(1){animation-delay:.02s;}
  .tally span:nth-child(2){animation-delay:.1s;}
  .tally span:nth-child(3){animation-delay:.18s;}
  .tally span:nth-child(4){animation-delay:.26s;}
  .tally span:nth-child(5){animation-delay:.34s;}
  @keyframes rise{from{transform:scaleY(0);opacity:0;} to{transform:scaleY(1);opacity:1;}}
  .tally span:nth-child(4){animation-name:rise-diag; transform:rotate(28deg);}
  @keyframes rise-diag{from{transform:rotate(28deg) scaleY(0); opacity:0;} to{transform:rotate(28deg) scaleY(1); opacity:1;}}

  .eyebrow{
    font-size:13px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--bronze);
    margin-bottom:18px;
  }
  h1.title{
    font-size:clamp(32px,5vw,48px);
    font-weight:600;
    margin:0 0 22px;
    color:var(--bone);
  }
  .sub{
    font-size:17px;
    color:var(--bone-dim);
    max-width:560px;
    margin:0 auto;
  }
  
  /* YouTube 按钮与欢迎语 */
  .hero-actions {
    margin-top: 36px;
  }
  .btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--bronze);
    color: var(--ink);
    padding: 14px 32px;
    border-radius: 999px;
    font-weight: 600;
    text-decoration: none;
    font-size: 15px;
    transition: all 0.25s ease;

  .btn-primary:hover {
    background: var(--bone);
    color: var(--ink);

  .welcome-text {
    font-size: 14.5px;

  section{

  ul.plain{list-style:none; padding:0; margin:0;}

  }

  .notice{
    border-left:3px solid var(--moss);
    background:rgba(74,93,82,0.1);

    border-radius:2px;
    margin:18px 0;
  }
  .notice p{margin:0; color:var(--bone); font-size:15px; line-height: 1.7;}
  .notice p b { color: var(--bronze); font-weight: 600;}

  /* 动态更新区 (Recent Logs) */
  .log-card {
    border-left: 2px solid var(--bronze);
    padding-left: 20px;
    margin-top: 16px;
  }
  .log-date {
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    color: var(--bronze);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
    font-weight: 500;
  }
  .log-text {
    font-size: 15.5px;
    color: var(--bone-dim);
    line-height: 1.7;
    margin: 0;
    text-align: justify;
  }

  .stat-row{
    display:flex; gap:32px;
    margin-top:8px;
    flex-wrap:wrap;
  }
  .stat{
    border-top:2px solid var(--bronze);
    padding-top:10px;
  }
  .stat .num{
    font-family:'Fraunces','Noto Serif SC',serif;
    font-size:18px;
    color:var(--bone);
    display:block;
  }
  .stat .lbl{
    font-size:12.5px;
    color:var(--bone-faint);
    text-transform:uppercase;
    letter-spacing:0.08em;
  }

  /* ---- 文章内容样式 ---- */
  .article-content {
    margin-top: 36px;
    padding-top: 36px;
    border-top: 1px solid rgba(201,195,184,0.1);
  }
  .article-content h3 {
    font-size: 19px;
    font-weight: 600;
    color: var(--bone);
    margin: 32px 0 16px;
  }
  .article-content p {
    font-size: 15.5px;
    line-height: 1.8;
    color: var(--bone-dim);
    margin-bottom: 20px;
    text-align: justify;
  }

  .contact-line{
    margin-top:18px;
    padding:16px 20px;
    background:rgba(242,237,228,0.04);
    border-radius:4px;
    font-size:14.5px;
  }
  .contact-line .lbl{color:var(--bone-faint); margin-right:8px;}
  .contact-line .val{color:var(--bronze);}

  footer{
    text-align:center;
    padding:48px 28px 64px;
    color:var(--bone-faint);
    font-size:13px;
  }
  footer .tally{transform:scale(0.55); margin-bottom:14px; opacity:0.5;}

  details{
    border-bottom:1px solid rgba(201,195,184,0.14);
    padding:16px 0;
  }
  details summary{
    cursor:pointer;
    font-family:'Fraunces','Noto Serif SC',serif;
    color:var(--bone);
    font-size:16.5px;
    list-style:none;
    display:flex; justify-content:space-between; align-items:center;
    gap:12px;
  }
  details summary::-webkit-details-marker{display:none;}
  details summary::after{
    content:'+';
    color:var(--bronze);
    font-size:20px;
    margin-left:12px;
    transition:transform .25s ease;
    flex-shrink:0;
  }
  details[open] summary::after{transform:rotate(45deg);}
  details .a{color:var(--bone-dim); margin-top:12px; font-size:15px; padding-right:8px; line-height: 1.7;}

  @media (max-width:560px){
    .hero{padding:64px 20px 48px;}
    section{padding:40px 20px;}
  }
</style>
</head>

<script>
  var FAQ_KEYS = ['real', 'meaning', 'monk', 'precepts', 'livestream', 'method', 'job', 'family', 'escape'];

  function render(lang){
    var c = window.CONTENT[lang];

    document.getElementById('brand-text').textContent = c.brand;
    document.getElementById('t-eyebrow').textContent = c.eyebrow;
    document.getElementById('t-title1').textContent = c.title_line1;
    document.getElementById('t-title2').textContent = c.title_line2;
    document.getElementById('t-subtitle').textContent = c.subtitle;
    
    document.getElementById('t-btn-youtube').textContent = c.btn_youtube;
    document.getElementById('t-welcome-msg').textContent = c.welcome_msg;

    document.getElementById('t-about-label').textContent = c.section_about_label;
    document.getElementById('t-about-title').textContent = c.section_about_title;
    document.getElementById('t-about-lead').textContent = c.about_lead;
    document.getElementById('t-about-body').textContent = c.about_body;
    document.getElementById('t-purpose-title').textContent = c.about_purpose_title;
    document.getElementById('t-purpose-body').innerHTML = c.about_purpose_body;
    document.getElementById('t-about-notice').innerHTML = c.about_notice;

    // ---- Schedule Data Binding ----
    document.getElementById('t-schedule-label').textContent = c.section_schedule_label;
    document.getElementById('t-schedule-title').textContent = c.section_schedule_title;
    document.getElementById('t-schedule-lead').textContent = c.schedule_lead;
    document.getElementById('t-schedule-note').textContent = c.schedule_note;
    document.getElementById('schedule-list').innerHTML =
      '<li>' + c.schedule_1 + '</li>' +
      '<li>' + c.schedule_2 + '</li>' +
      '<li>' + c.schedule_3 + '</li>' +
      '<li>' + c.schedule_4 + '</li>';

    document.getElementById('t-logs-label').textContent = c.section_logs_label;
    document.getElementById('t-logs-title').textContent = c.section_logs_title;
    document.getElementById('t-log-date-1').textContent = c.log_date_1;
    document.getElementById('t-log-text-1').textContent = c.log_text_1;

    document.getElementById('t-journey-label').textContent = c.section_journey_label;
    document.getElementById('t-journey-title').textContent = c.section_journey_title;
    document.getElementById('t-journey-years-val').textContent = c.journey_years_value;
    document.getElementById('t-journey-years-lbl').textContent = c.journey_years_label;
    document.getElementById('t-journey-full').innerHTML = c.journey_full_text;

    document.getElementById('t-pramote-label').textContent = c.section_pramote_label;
    document.getElementById('t-pramote-title').textContent = c.section_pramote_title;
    document.getElementById('t-pramote-body1').textContent = c.pramote_body1;
    document.getElementById('t-pramote-body2').textContent = c.pramote_body2;
    document.getElementById('t-pramote-body3').textContent = c.pramote_body3;

    document.getElementById('t-support-label').textContent = c.section_support_label;
    document.getElementById('t-support-title').textContent = c.section_support_title;
    document.getElementById('t-support-body1').textContent = c.support_body1;
    document.getElementById('t-support-body2').textContent = c.support_body2;
    document.getElementById('t-support-contact-label').textContent = c.support_contact_label;
    document.getElementById('t-support-contact-value').textContent = c.support_contact_value;

    document.getElementById('t-faq-label').textContent = c.section_faq_label;
    document.getElementById('t-faq-title').textContent = c.section_faq_title;

    var faqHtml = '';
    FAQ_KEYS.forEach(function(key, i){
      var q = c['faq_' + key + '_q'];
      var a = c['faq_' + key + '_a'];
      if(q && a) {
        faqHtml += '<details' + (i === 0 ? ' open' : '') + '>' +
          '<summary>' + q + '</summary>' +
          '<p class="a">' + a + '</p>' +
          '</details>';
      }
    });
    document.getElementById('faq-list').innerHTML = faqHtml;

    document.getElementById('t-rules-label').textContent = c.section_rules_label;
    document.getElementById('t-rules-title').textContent = c.section_rules_title;
    
    // Binding the 5 rules
    document.getElementById('rules-list').innerHTML =
      '<li>' + c.rule1 + '</li>' +
      '<li>' + c.rule2 + '</li>' +
      '<li>' + c.rule3 + '</li>' +
      '<li>' + c.rule4 + '</li>' +
      '<li>' + c.rule5 + '</li>';

    document.getElementById('t-footer').textContent = c.footer_line;

    document.documentElement.setAttribute('lang', lang === 'zh' ? 'zh' : 'en');
  }

  function setLang(l){
    render(l);
    document.querySelectorAll('.lang-switch button').forEach(function(btn){
      btn.classList.toggle('active', btn.dataset.set === l);
    });
    try { localStorage.setItem('site-lang', l); } catch(e){}
  }

  (function(){
    var saved = null;
    try { saved = localStorage.getItem('site-lang'); } catch(e){}
    var lang = saved || 'zh';
    setLang(lang);
  })();
</script>
